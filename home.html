<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;

  display: flex;
  flex-direction: column;
  align-items: center;
}

h2 {
  margin-top: 20px;
  font-size: 24px;
}

.card {
  background: rgba(255,255,255,0.05);
  width: 90%;
  max-width: 350px;
  margin: 15px auto;
  padding: 18px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

.card h3 {
  margin-bottom: 8px;
  font-size: 18px;
}

p {
  font-size: 16px;
  margin: 6px 0;
}


/* 🔥 INPUT BONITO */
input {
  width: 80%;
  max-width: 250px;
  padding: 8px;
  margin: 10px auto;
  display: block;
  border-radius: 8px;
  border: none;
  outline: none;
  text-align: center;
  font-size: 14px;
}


/* 🔥 BOTÃO AJUSTADO */
button {
  padding: 10px;
  margin-top: 8px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
  font-weight: bold;
  cursor: pointer;
  width: 80%;
  max-width: 250px;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.divider {
  height: 1px;
  width: 80%;
  max-width: 300px;
  background: rgba(255,255,255,0.1);
  margin: 15px auto;
}
</style>
</head>

<body>

<h2>🚗 Controle do Carro</h2>

<div class="card">
  <h3>💳 Financiamento</h3>

  <p id="pagoBanco"></p>
  <p id="restanteBanco"></p>

  <input id="inputBanco" type="number" placeholder="Digite o valor pago" />

  <button id="btnParcela" onclick="pagarParcela()">Adicionar pagamento</button>
</div>

<div class="divider"></div>

<div class="card">
  <h3>🤝 Acordo</h3>

  <p id="dividaTotal"></p>
  <p id="pagoAcordo"></p>
  <p id="restanteAcordo"></p>

  <input id="inputAcordo" type="number" placeholder="Digite o valor pago" />

  <button id="btnAcordo" onclick="pagarAcordo()">Adicionar pagamento</button>
</div>
<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="home.js"></script>

</body>
</html>
