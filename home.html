<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>     
/* 🌍 BASE */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

/* 🧠 TÍTULO */
h2 {
  margin-top: 20px;
  font-size: 24px;
  letter-spacing: 1px;
}

/* 📦 CARD */
.card {
  background: rgba(255,255,255,0.06);
  width: 90%;
  max-width: 350px;
  margin: 15px auto;
  padding: 18px;
  border-radius: 15px;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 20px rgba(0,0,0,0.35);
  transition: 0.2s;
  display: block;
}

.card:hover {
  transform: scale(1.02);
}

/* 🧾 TÍTULO DO CARD */
.card h3 {
  margin-bottom: 8px;
  font-size: 18px;
}

/* 📊 TEXTOS */
p {
  font-size: 16px;
  margin: 6px 0;
  opacity: 0.9;
}

/* ✏️ INPUT */
input {
  width: 80%;
  max-width: 250px;
  padding: 8px;
  margin: 10px auto;
  display: block;
  border-radius: 8px;
  border: none;
  outline: none;
  text-align: center;
  font-size: 14px;
  background: rgba(255,255,255,0.1);
  color: white;
}

input::placeholder {
  color: rgba(255,255,255,0.6);
}

/* 🔘 BOTÃO */
button {
  padding: 10px;
  margin-top: 8px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
  font-weight: bold;
  cursor: pointer;
  width: 80%;
  max-width: 250px;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  opacity: 0.95;
}

button:active {
  transform: scale(0.98);
}

/* ➖ DIVISOR */
.divider {
  height: 1px;
  width: 80%;
  max-width: 300px;
  background: rgba(255,255,255,0.1);
  margin: 15px auto;
}

/* 📱 RESPONSIVO */
@media (max-width: 500px) {
  h2 { font-size: 20px; }
  .card { padding: 15px; }
  p { font-size: 14px; }
}

/* 🔥 ABAS */
.aba {
  display: none;
  width: 100%;
}

/* 💣 CORREÇÃO FINAL (ESSA RESOLVE) */
.aba > .card {
  display: block;
  width: 100%;
  max-width: 350px;
  margin: 15px auto;
}
  #aba-veiculo .card {
  display: block !important;
  width: 90% !important;
  max-width: 350px !important;
  margin: 15px auto !important;
}
  .card {
  display: block !important;
}
</style>
</head>

<body>

<h2>🚗 Controle do Carro</h2>

<div id="menu" style="display:flex; gap:10px; justify-content:center; margin:20px; flex-wrap:wrap;">
  <button onclick="abrirAba('home')">🏠 Home</button>
  <button onclick="abrirAba('financeiro')">💰 Financeiro</button>
  <button onclick="abrirAba('manutencao')">🔧 Manutenção</button>
  <button onclick="abrirAba('veiculo')">🚗 Veículo</button>
  <button onclick="abrirAba('rastreamento')">📍 Rastreamento</button>
  <button onclick="abrirAba('config')">⚙️ Config</button>
</div>

<div id="aba-home" class="aba">
  <div class="card">
    <h3>🚨 Alertas</h3>
    <p id="alertasHome">Nenhum alerta no momento</p>
  </div>
</div>

<div id="aba-financeiro" class="aba">

  <div class="card">
    <h3>💰 Financiamento</h3>

    <p id="totalBanco"></p>
    <p id="pagoBanco"></p>
    <p id="restanteBanco"></p>

    <p id="dataBanco"></p>
    <p id="proximoBanco"></p>

    <input id="inputBanco" type="number" placeholder="Digite o valor pago">
    <button onclick="pagarParcela()">Adicionar pagamento</button>
    <div id="historicoFinanceiro"></div>
  </div>

  <div class="divider"></div>

  <div class="card">
    <h3>🤝 Acordo</h3>

    <p id="dividaTotal"></p>
    <p id="pagoAcordo"></p>
    <p id="restanteAcordo"></p>

    <input id="inputAcordo" type="number" placeholder="Digite o valor pago">
    <button onclick="pagarAcordo()">Adicionar pagamento</button>
  </div>

</div>

<div id="aba-manutencao" class="aba">

  <div class="card">
    <h3>🔧 Manutenção do Veículo</h3>
    <div id="listaManutencao"></div>
  </div>

  <div class="card">
    <h3>📄 Histórico</h3>
    <div id="historicoManutencao"></div>
    <button onclick="salvarManutencao()">Testar Manutenção</button>
  </div>

</div>

<div id="aba-veiculo" class="aba">

  <div class="card">
    <h3>⛽ Abastecimento</h3>

    <input id="kmAtual" placeholder="KM atual">
    <input id="litrosAbastecidos" placeholder="Litros abastecidos">

    <button onclick="salvarAbastecimento()">Salvar</button>

    <p id="statusAbastecimento"></p>
    <p id="mediaGeralTexto"></p>
  </div>

  <div class="card">
    <h3>📊 Histórico de Consumo</h3>
    <div id="historicoAbastecimento"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="home.js"></script>

</body>
</html>
