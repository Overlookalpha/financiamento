<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

h2 {
  margin-top: 30px;
  font-size: 28px;
}

.card {
  background: rgba(255,255,255,0.05);
  margin: 20px;
  padding: 25px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

.card h3 {
  margin-bottom: 10px;
}

p {
  font-size: 18px;
  margin: 10px 0;
}

button {
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
  font-weight: bold;
  cursor: pointer;
  width: 80%;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.divider {
  height: 2px;
  background: rgba(255,255,255,0.1);
  margin: 20px;
}
</style>
</head>

<body>

<h2>🚗 Controle do Carro</h2>

<div class="card">
  <h3>💳 Financiamento</h3>
  <p id="parcelas"></p>
  <button id="btnParcela" onclick="pagarParcela()">Paguei parcela</button>
</div>

<div class="divider"></div>

<div class="card">
  <h3>🤝 Acordo (100€/mês)</h3>
  <p id="acordo"></p>
  <button id="btnAcordo" onclick="pagarAcordo()">Paguei 100€</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="home.js"></script>

</body>
</html>
